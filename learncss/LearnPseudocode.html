<html>
    <head>
        <title>Tiêu đề trang</title>
        <style type="text/css">
            a:link{
                color:blue;
            }
            a:visited{
                color:red;
                font-style: italic;
            }
            a:hover{
                color:purple;
                font-weight: bold;
            }
            a#myfaculty:active{
                color:green;             
            }
            tbody tr:nth-child(2n+1){
                background-color: lightgray;
            }
            tbody tr:nth-child(2n){
                background-color: pink;
            }
            tbody tr:hover{
                background-color: yellow;
                cursor: pointer;
            }

        </style>
    </head>
    <body>
        <h3>
            Faculty of Information Systems
        </h3>
        <a id="myfaculty" href="https://is.uel.edu.vn">Visit our website</a>
        <h3>
            <a href="https://uel.edu.vn">uel.edu.vn</a>
        </h3>
        <table border="1">
            <caption>List of Products</caption>
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Product Name</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Product A</td>
                    <td>$10</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Product B</td>
                    <td>$20</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Product C</td>
                    <td>$30</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Product D</td>
                    <td>$40</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>Product E</td>
                    <td>$50</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
