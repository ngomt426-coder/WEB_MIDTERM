<html>
    <head>
        <title>Tiêu đề trang</title>
    </head>
    <body>
        <h1>Provinces</h1>
        <form name="provinceForm">
            <select name="provinces" id="provinces" onchange="provinceForm.selectedProvince.value = this.value; provinceForm.selectedProvinceName.value = this.options[this.selectedIndex].text;">
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
            </select>
            <p>Value of selected province:</p>
            <input type="text" id="selectedProvince" readonly>
            <p>Name of selected province:</p>
            <input type="text" id="selectedProvinceName" readonly>
        </form>
    </body>
</html>
