<html>
    <head>
        <title>Tiêu đề trang</title>
    </head>
    <body>
        <form name="colorForm">
            <h3>Select background color:</h3>
            <select id="colorSelect" name="colorSelect" size="5" onchange="colorForm.selectedColor.value = this.value;colorForm.selectedColor.style.backgroundColor = this.value;divColor.style.backgroundColor = this.value; ">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="yellow">Yellow</option>
                <option value="pink">Pink</option>
            </select>
            <p>Your selected color is:</p>
            <input type="text" id="selectedColor" name="selectedColor">   
            <div id="divColor" style="width: 100px; height: 100px; border: 1px solid black;">

            
            </div>         
        </form>

        <form name="imgForm">
            <h3>Select an image:</h3>
            <select id="imageSelect" name="imageSelect" size="5">
                <option value="logo_uel.png">Logo UEL</option>
                <option value="logo_vnu.png">Logo VNU</option>
                <option value="myavatar.png">Bản mặt Tui</option>                
            </select>
            <p>Your selected image is:</p>
            <img id="selectedImage" name="selectedImage" alt="No image selected"
            style="width: 200px; height: 200px;">
        </form>
    </body>
</html>
